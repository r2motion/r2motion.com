name: Deploy to Cloudways

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: cloudways-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and upload
    runs-on: ubuntu-latest
    env:
      HAS_SFTP: ${{ secrets.SFTP_HOST != '' && secrets.SFTP_USERNAME != '' && secrets.SFTP_TARGET_PATH != '' && (secrets.SFTP_PASSWORD != '' || secrets.SFTP_PRIVATE_KEY != '') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload dist by SFTP
        if: env.HAS_SFTP == 'true'
        uses: appleboy/scp-action@v1
        env:
          SFTP_PORT: ${{ secrets.SFTP_PORT || '22' }}
        with:
          host: ${{ secrets.SFTP_HOST }}
          username: ${{ secrets.SFTP_USERNAME }}
          password: ${{ secrets.SFTP_PASSWORD }}
          key: ${{ secrets.SFTP_PRIVATE_KEY }}
          port: ${{ env.SFTP_PORT }}
          source: dist/*
          target: ${{ secrets.SFTP_TARGET_PATH }}
          strip_components: 1
          rm: true
          overwrite: true
          timeout: 30s
          command_timeout: 10m

      - name: Skip upload notice
        if: env.HAS_SFTP != 'true'
        run: |
          echo "Build completed. Add Cloudways SFTP secrets to enable deployment upload."
